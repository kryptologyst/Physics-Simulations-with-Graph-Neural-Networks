# Model configuration
model:
  type: "egnn"  # Options: "gcn", "gat", "egnn"
  input_dim: 5  # pos(2) + vel(2) + mass(1)
  hidden_dim: 64
  output_dim: 2  # velocity update
  num_layers: 3
  dropout: 0.1
  use_residual: true

# Training configuration
training:
  batch_size: 32
  learning_rate: 0.001
  weight_decay: 1e-5
  num_epochs: 100
  patience: 20
  gradient_clip_norm: 1.0

# Data configuration
data:
  num_samples: 1000
  num_particles: 50
  dim: 2  # 2D or 3D simulation
  interaction_type: "gravitational"  # Options: "gravitational", "spring", "repulsive"
  sequence_length: 20
  train_split: 0.8
  val_split: 0.1
  test_split: 0.1

# Physics simulation parameters
physics:
  dt: 0.01  # Time step
  gravity: 9.81
  spring_constant: 1.0
  damping: 0.99
  boundary_size: 10.0

# Evaluation configuration
evaluation:
  rollout_steps: 50
  stability_steps: 1000
  num_eval_samples: 10

# Device configuration
device:
  auto_detect: true
  cuda: true
  mps: true  # Apple Silicon
  cpu: true

# Logging configuration
logging:
  log_dir: "logs"
  log_level: "INFO"
  use_wandb: false
  use_tensorboard: true

# Checkpointing
checkpoints:
  save_dir: "checkpoints"
  save_best: true
  save_last: true
  save_every: 10

# Reproducibility
seed: 42
