# EGNN model configuration
model:
  type: "egnn"
  input_dim: 5
  hidden_dim: 128
  output_dim: 2
  num_layers: 4
  dropout: 0.1
  use_residual: true

# Training configuration
training:
  batch_size: 64
  learning_rate: 0.0005
  weight_decay: 1e-5
  num_epochs: 200
  patience: 30
  gradient_clip_norm: 1.0

# Data configuration
data:
  num_samples: 2000
  num_particles: 100
  dim: 2
  interaction_type: "gravitational"
  sequence_length: 30
  train_split: 0.8
  val_split: 0.1
  test_split: 0.1

# Physics simulation parameters
physics:
  dt: 0.005
  gravity: 9.81
  spring_constant: 1.0
  damping: 0.995
  boundary_size: 15.0

# Evaluation configuration
evaluation:
  rollout_steps: 100
  stability_steps: 2000
  num_eval_samples: 20

# Device configuration
device:
  auto_detect: true
  cuda: true
  mps: true
  cpu: true

# Logging configuration
logging:
  log_dir: "logs"
  log_level: "INFO"
  use_wandb: false
  use_tensorboard: true

# Checkpointing
checkpoints:
  save_dir: "checkpoints"
  save_best: true
  save_last: true
  save_every: 20

# Reproducibility
seed: 42
